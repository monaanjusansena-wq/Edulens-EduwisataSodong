<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Edu-LENS Mobile AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Menghilangkan margin default agar kamera full screen */
        body { margin: 0; overflow: hidden; touch-action: none; }
        #info-panel {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            z-index: 999;
            display: none;
            pointer-events: auto;
        }
    </style>
</head>

<body>
    <div id="info-panel" class="bg-white rounded-3xl shadow-2xl p-6 border-t-4 border-green-600 animate-bounce-in">
        <h2 id="plant-name" class="text-2xl font-bold text-green-900">Nama Tanaman</h2>
        <p id="plant-latin" class="text-sm italic text-green-600 mb-3"></p>
        <div class="space-y-3">
            <div>
                <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Fakta Etnobotani</span>
                <p id="plant-fact" class="text-gray-700 text-sm leading-snug"></p>
            </div>
            <div class="bg-green-50 p-3 rounded-xl border border-green-100">
                <span class="text-[10px] font-black text-green-600 uppercase tracking-widest">Aksi Ekoliterasi</span>
                <p id="plant-eco" class="text-green-900 text-sm italic font-medium"></p>
            </div>
        </div>
    </div>

    <a-scene 
        embedded 
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3; sourceWidth:1280; sourceHeight:960; displayWidth: 1280; displayHeight: 960;">
        
        <a-marker preset="hiro">
            <a-torus--knot radius="0.25" radius-tubular="0.05" color="#16a34a" animation="property: rotation; to: 0 360 0; loop: true; dur: 3000"></a-torus-knot>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const plantData = {
            "18": { name: "Sambiloto", latin: "Andrographis paniculata", fact: "Si 'Raja Pahit' andalan warga Sodong untuk imunitas.", eco: "Menanamnya menyediakan pestisida alami bagi lingkungan." },
            "8": { name: "Talas", latin: "Colocasia esculenta", fact: "Pangan lokal pengganti nasi yang kaya serat.", eco: "Perhatikan 'Efek Lotus' pada daunnya yang menolak air secara alami." }
        };

        window.addEventListener('load', function () {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (id && plantData[id]) {
                const data = plantData[id];
                document.getElementById('plant-name').innerText = data.name;
                document.getElementById('plant-latin').innerText = data.latin;
                document.getElementById('plant-fact').innerText = data.fact;
                document.getElementById('plant-eco').innerText = data.eco;
                document.getElementById('info-panel').style.display = 'block';
            }
        });
    </script>
</body>
</html>
